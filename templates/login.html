<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Black Chat | Login</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-image: radial-gradient(circle at top right, #1e3a8a 0%, #000 50%); }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 16px; width: 320px; box-shadow: 0 4px 30px rgba(0,0,0,0.5); text-align: center; }
        .glass-panel h2 { margin-top: 0; color: #38bdf8; letter-spacing: 1px; text-transform: uppercase; }
        input { width: 100%; box-sizing: border-box; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: #38bdf8; box-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        button { width: 100%; padding: 12px; background: transparent; border: 1px solid #38bdf8; color: #38bdf8; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: #38bdf8; color: #000; box-shadow: 0 0 15px #38bdf8; }
        .error { color: #f87171; font-size: 0.9em; margin-bottom: 15px; }
    </style>
</head>
<body>
    <form class="glass-panel" method="POST">
        <h2>System Login</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Authenticate</button>
    </form>
</body>
</html>
