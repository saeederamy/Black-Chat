<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#14151a">
    <title>Black Chat | V 1.0.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        /* X-UI Sanaei Exact Theme Variables */
        :root {
            --bg-base: #14151a;       
            --bg-panel: #1e2029;      
            --bg-input: #282a36;      
            --border: #313238;
            
            --c-blue: #1890ff;        
            --c-blue-hover: #40a9ff;
            --c-red: #f5222d;         
            --c-orange: #fa8c16;      
            --c-white: #ffffff;
            --c-gray: #a3a6ad;
            
            --bubble-me: #1890ff;
            --bubble-other: #282a36;
        }

        /* Light Mode Variables */
        [data-theme="light"] {
            --bg-base: #f0f2f5;       
            --bg-panel: #ffffff;      
            --bg-input: #f4f4f5;      
            --border: #e4e4e7;
            
            --c-white: #18181b; /* متن در لایت مود تیره می‌شود */
            --c-gray: #71717a;
            
            --bubble-me: #1890ff;
            --bubble-other: #f4f4f5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif; outline: none; -webkit-tap-highlight-color: transparent;}
        body { display: flex; height: 100dvh; background: var(--bg-base); color: var(--c-white); overflow: hidden; transition: background 0.3s, color 0.3s; }

        /* --- Login Screen --- */
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-base); display:flex; justify-content:center; align-items:center; flex-direction: column; z-index: 9999; }
        .login-box { background: var(--bg-panel); border: 1px solid var(--border); padding: 40px; border-radius: 12px; text-align: center; width: 90%; max-width: 360px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .login-box h2 { margin-bottom: 25px; color: var(--c-white); font-weight: 700; }
        .login-box input { width: 100%; padding: 14px; margin-bottom: 15px; background: var(--bg-input); border: 1px solid var(--border); color: var(--c-white); border-radius: 8px; font-size: 15px; text-align: center; transition: 0.3s;}
        .login-box input:focus { border-color: var(--c-blue); }
        .login-box button { width: 100%; padding: 14px; background: var(--c-blue); color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 16px;}
        .login-box button:hover { background: var(--c-blue-hover); transform: translateY(-2px); }
        .dev-credit { margin-top: 30px; color: var(--c-gray); font-size: 13px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }

        #app { display: none; width: 100%; height: 100%; }

        /* --- Sidebar --- */
        .sidebar { width: 340px; background: var(--bg-panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; transition: transform 0.3s; flex-shrink: 0; }
        
        .sidebar-header { display: flex; align-items: center; padding: 15px 15px; gap: 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;}
        .icon-btn { width: 40px; height: 40px; border-radius: 8px; background: transparent; border: none; color: var(--c-gray); cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 20px; transition: 0.2s; flex-shrink: 0;}
        .icon-btn:hover { background: var(--bg-input); color: var(--c-blue); }
        
        .new-chat-btn { background: var(--c-blue); color: white; border: none; border-radius: 8px; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; cursor: pointer; flex-shrink: 0; font-size: 22px; transition: 0.2s;}
        .new-chat-btn:hover { background: var(--c-blue-hover); transform: scale(1.05); }

        .search-box { flex: 1; background: var(--bg-input); border-radius: 8px; display: flex; align-items: center; padding: 0 10px; height: 40px; min-width: 0; border: 1px solid var(--border);}
        .search-box input { flex: 1; background: transparent; border: none; color: var(--c-white); font-size: 14px; padding: 0 5px; min-width: 0;}

        .chat-list { flex: 1; overflow-y: auto; padding: 10px 5px; }
        .chat-item { display: flex; align-items: center; padding: 12px 10px; cursor: pointer; gap: 12px; border-radius: 8px; margin-bottom: 2px; position: relative; border: 1px solid transparent;}
        .chat-item:hover { background: var(--bg-input); border-color: var(--border); }
        .chat-item.active { background: var(--bg-input); border-color: var(--c-blue); }
        
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--c-blue); color: #fff; display: flex; justify-content: center; align-items: center; font-size: 20px; flex-shrink: 0;}
        .chat-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center;}
        .chat-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--c-white); }
        .chat-preview { font-size: 13px; color: var(--c-gray); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .unread-badge { background: var(--c-red); color: white; font-size: 12px; font-weight: bold; padding: 2px 8px; border-radius: 12px; display: none; margin-right: auto;}

        /* --- Chat Area --- */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-base); min-width: 0; min-height: 0; position: relative; background-size: cover; background-position: center;}
        
        .chat-header { height: 65px; background: var(--bg-panel); display: flex; align-items: center; padding: 0 15px; gap: 15px; border-bottom: 1px solid var(--border); z-index: 10; flex-shrink: 0;}
        .back-btn { display: none; font-weight: bold;}
        [dir="rtl"] .back-btn { transform: scaleX(-1); }

        .messages { flex: 1; padding: 20px 5%; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; min-height: 0;}
        .msg-row { display: flex; width: 100%; position: relative; }
        .msg-row.out { justify-content: flex-start; } 
        .msg-row.in { justify-content: flex-end; }
        
        .bubble { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 15px; line-height: 1.5; position: relative; word-break: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.1); display: flex; flex-direction: column; border: 1px solid var(--border);}
        .msg-row.out .bubble { background: var(--bubble-me); color: #fff; border-bottom-right-radius: 4px; border-color: var(--c-blue); }
        .msg-row.in .bubble { background: var(--bubble-other); color: var(--c-white); border-bottom-left-radius: 4px;}
        
        .sender-name { font-size: 12px; color: var(--c-red); font-weight: bold; margin-bottom: 5px; display: block; }
        .msg-row.out .sender-name { display: none; }
        
        .delete-btn { position: absolute; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: var(--c-red); font-size: 20px; cursor: pointer; opacity: 0; transition: 0.2s; padding: 5px;}
        .msg-row.out .delete-btn { left: calc(100% + 5px); }
        .msg-row:hover .delete-btn { opacity: 1; }

        /* Media in chat */
        .bubble img { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .bubble audio { width: 240px; height: 40px; margin-top: 5px; outline: none; border-radius: 20px;}
        
        /* Telegram Style File Links */
        .file-link { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; color: var(--c-white); text-decoration: none; margin-top:5px; border: 1px solid var(--border); transition: 0.2s;}
        .file-link:hover { background: var(--bg-input); }
        .file-icon { width: 44px; height: 44px; border-radius: 50%; background: var(--c-blue); display: flex; justify-content: center; align-items: center; color: white; flex-shrink: 0;}
        .file-info-dl { display: flex; flex-direction: column; overflow: hidden; }
        .file-name-dl { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Telegram Video Message Bubble */
        .video-msg { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; border: 3px solid var(--c-blue); margin-top: 5px; }

        /* Video Preview Circle */
        #videoPreview { display: none; position: absolute; bottom: 80px; right: 20px; width: 220px; height: 220px; border-radius: 50%; object-fit: cover; border: 4px solid var(--c-red); box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; transform: scaleX(-1); background: #000;}
        [dir="rtl"] #videoPreview { right: auto; left: 20px; }

        /* --- Input Area Mobile Fix --- */
        .input-area { 
            padding: 10px 15px; 
            padding-bottom: max(10px, env(safe-area-inset-bottom)); 
            background: var(--bg-panel); 
            display: flex; 
            align-items: center; /* مرکزچین عمودی برای جلوگیری از گیر کردن */
            gap: 10px; 
            border-top: 1px solid var(--border); 
            z-index: 10; 
            flex-shrink: 0;
            width: 100%;
        }
        .input-box { flex: 1; background: var(--bg-input); border-radius: 12px; display: flex; align-items: center; padding: 0 5px; min-height: 48px; border: 1px solid var(--border); min-width: 0;}
        .input-box input { flex: 1; background: transparent; border: none; color: var(--c-white); font-size: 15px; padding: 10px; min-width: 0;}
        
        .action-btn { width: 44px; height: 44px; border-radius: 50%; background: transparent; border: none; color: var(--c-gray); font-size: 20px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; flex-shrink: 0;}
        .action-btn:hover { color: var(--c-white); background: var(--bg-input); }
        .action-btn.send { background: var(--c-blue); color: white; }
        .action-btn.rec { background: var(--c-red); color: white; animation: pulse 1s infinite; }
        
        .rec-timer { display: none; color: var(--c-red); font-weight: bold; font-family: monospace; font-size: 16px; padding: 0 10px; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* --- Modals --- */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .modal-box { background: var(--bg-panel); border: 1px solid var(--border); padding: 25px; border-radius: 12px; width: 90%; max-width: 380px; box-shadow: 0 15px 50px rgba(0,0,0,0.9); display: flex; flex-direction: column; gap: 15px;}
        .modal-box h3 { color: var(--c-white); font-weight: 600;}
        .modal-box input, .modal-box select { width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border); color: var(--c-white); border-radius: 8px; font-size: 14px;}
        
        .contact-list-box { max-height: 150px; overflow-y: auto; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 10px;}
        .contact-check { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer; color: var(--c-white);}
        .contact-check:last-child { border-bottom: none; }
        
        .modal-actions { display: flex; gap: 10px; margin-top: 10px; }
        .modal-actions button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer;}
        .btn-cancel { background: var(--bg-input); color: var(--c-white); border: 1px solid var(--border);}
        .btn-cancel:hover { background: var(--border); }
        .btn-confirm { background: var(--c-blue); color: #fff; }
        .btn-confirm:hover { background: var(--c-blue-hover); }
        
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border);}
        .ip-list { max-height: 120px; overflow-y: auto; background: var(--bg-input); border-radius: 8px; padding: 10px; font-size: 12px; font-family: monospace; color: var(--c-orange); direction: ltr; text-align: left; border: 1px solid var(--border);}

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .sidebar { position: absolute; top:0; right:0; width: 100%; height: 100%; z-index: 50; }
            .sidebar.hidden { transform: translateX(100%); }
            .back-btn { display: flex !important; }
            .messages { padding: 15px; }
            .bubble { max-width: 92%; }
            .msg-row.out .delete-btn { left: 0; top: -15px; transform: none; font-size:16px;}
            #videoPreview { width: 150px; height: 150px; bottom: 70px; right: 10px;}
            [dir="rtl"] #videoPreview { left: 10px; }
        }
    </style>
</head>
<body>

    <svg style="display:none;">
        <symbol id="icon-back" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></symbol>
        <symbol id="icon-attach" viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></symbol>
        <symbol id="icon-mic" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></symbol>
        <symbol id="icon-cam" viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></symbol>
        <symbol id="icon-send" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></symbol>
        <symbol id="icon-doc" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></symbol>
    </svg>

    <div id="login-screen">
        <div class="login-box">
            <h2 data-i18n="login_title">ورود به سیستم</h2>
            <input type="text" id="username" placeholder="Username" autocomplete="off" autocapitalize="none" dir="ltr">
            <input type="password" id="password" placeholder="Password" dir="ltr">
            <button onclick="login()" data-i18n="btn_login">ورود / تایید</button>
        </div>
        <div class="dev-credit">Developed by saeed eramy</div>
    </div>

    <div id="app">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="icon-btn" onclick="openModal('settingsModal')" title="تنظیمات">⚙️</button>
                <button class="icon-btn" onclick="toggleTheme()" title="تغییر تم (لایت/دارک)">🌓</button>
                <div class="search-box">
                    <input type="text" id="searchInput" data-i18n-ph="search_ph" placeholder="جستجو..." onkeyup="searchChat()">
                </div>
                <button class="new-chat-btn" onclick="openContactModal()" title="چت یا گروه جدید">➕</button>
            </div>
            <div class="chat-list" id="chat-list"></div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="chat-header">
                <button class="icon-btn back-btn" onclick="closeChat()"><svg style="width:24px;fill:currentColor;"><use href="#icon-back"></use></svg></button>
                <div class="avatar" id="header-avatar" style="width:42px;height:42px;">📢</div>
                <div style="display:flex; flex-direction:column; justify-content:center;">
                    <h3 id="room-title" style="font-size:16px; font-weight:600;"></h3>
                    <span id="room-status" style="font-size:12px; color:var(--c-blue);"></span>
                </div>
            </div>
            
            <div class="messages" id="messages"></div>
            
            <video id="videoPreview" autoplay muted playsinline></video>

            <div class="input-area" id="input-area">
                <button class="action-btn" onclick="document.getElementById('fileInput').click()">
                    <svg style="width:24px;fill:currentColor;"><use href="#icon-attach"></use></svg>
                </button>
                <input type="file" id="fileInput" style="display:none" onchange="uploadFile()">
                
                <div class="input-box">
                    <span class="rec-timer" id="recTimer" dir="ltr">00:00</span>
                    <input type="text" id="msgInput" data-i18n-ph="type_ph" placeholder="پیام خود را بنویسید..." autocomplete="off" oninput="checkInput()">
                </div>
                
                <button class="action-btn" id="actionVideoBtn" onclick="startRecord('video', this)" title="ویدیو مسیج">
                    <svg style="width:24px;fill:currentColor;"><use href="#icon-cam"></use></svg>
                </button>
                <button class="action-btn" id="actionBtn" onclick="handleAction()" title="صدا / ارسال">
                    <svg style="width:24px;fill:currentColor;"><use href="#icon-mic"></use></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="contactModal">
        <div class="modal-box">
            <h3 data-i18n="add_contact">چت خصوصی جدید</h3>
            <input type="text" id="contactUsername" data-i18n-ph="username_ph" placeholder="آیدی دقیق شخص را وارد کنید" dir="ltr">
            <button class="btn-confirm" onclick="submitContact()" style="padding:12px; border-radius:8px; border:none; width:100%;">شروع چت</button>
            
            <hr style="border:0; border-top:1px solid var(--border); margin: 15px 0;">
            
            <h3 style="color:var(--c-blue);">گروه خصوصی جدید</h3>
            <input type="text" id="creationName" placeholder="نام گروه خصوصی">
            <div style="font-size:13px; margin-bottom:5px; color:var(--c-gray);">انتخاب اعضا (از مخاطبین شما):</div>
            <div class="contact-list-box" id="groupMembersList">
                </div>
            
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('contactModal')">لغو</button>
                <button class="btn-confirm" onclick="submitCreation()">ساخت گروه</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-box" style="max-width: 450px;">
            <h3 data-i18n="settings">تنظیمات سیستم</h3>
            
            <div class="toggle-row">
                <span data-i18n="language">زبان برنامه</span>
                <select id="langSelect" onchange="changeLang(this.value)" style="width:120px; padding:6px; margin:0;">
                    <option value="fa">فارسی</option>
                    <option value="en">English</option>
                </select>
            </div>
            
            <div class="toggle-row" style="flex-direction:column; align-items:flex-start; gap:10px;">
                <span data-i18n="chat_bg">پس‌زمینه چت (لینک عکس)</span>
                <input type="text" id="bgInput" placeholder="https://..." onchange="changeBg(this.value)" dir="ltr">
            </div>
            
            <div style="margin-top:10px;">
                <span style="font-size:13px; color:var(--c-gray);" data-i18n="active_sessions">آی‌پی‌های متصل شما</span>
                <div class="ip-list" id="ipList"></div>
            </div>
            
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('settingsModal')" style="flex: 2;">بستن</button>
                <button class="btn-confirm" onclick="location.reload()" style="flex: 1; background:var(--c-red);">خروج</button>
            </div>
        </div>
    </div>

    <audio id="notif-sound" src="data:audio/mp3;base64,//NExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq" preload="auto"></audio>
    <script src="/static/script.js"></script>
</body>
</html>
