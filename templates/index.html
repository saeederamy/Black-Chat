<!-- ============= LOGIN ============= -->
<div id="login-screen" class="screen bh-login">
    <div class="login-box">
        <div class="login-logo">
            <img src="/static/icon-192.png" alt="Black Chat" width="80" height="80">
        </div>
        <h1 class="login-title">Black Chat</h1>
        <p class="login-subtitle">Sign in to your account</p>
        <input type="text" id="login-username" placeholder="Username" autocomplete="username">
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
        <button id="login-btn" class="btn-primary">Sign In</button>
        <p id="login-error" class="login-error"></p>
    </div>
    <div class="bh-signature">
        <a href="https://github.com/saeederamy" target="_blank" rel="noopener">

<!-- ============= MAIN APP ============= -->
<div id="app" class="screen" style="display:none">

    <!-- ============= SIDEBAR (chat list) ============= -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <button id="menu-btn" class="icon-btn" title="Menu">
                <svg><use href="#i-menu"/></svg>
            </button>
            <div class="search-wrap">
                <svg class="search-icon"><use href="#i-search"/></svg>
                <input id="sidebar-search" type="text" placeholder="Search">
            </div>
        </div>
        <div id="chat-list" class="chat-list">
            <!-- chat items dynamically inserted -->
        </div>
        <button id="new-chat-btn" class="fab" title="New chat / group">
            <svg><use href="#i-pencil"/></svg>
        </button>
    </aside>

    <!-- ============= CHAT VIEW ============= -->
    <main id="chat-view" class="chat-view">
        <!-- empty state when no chat selected -->
        <div id="chat-empty" class="chat-empty">
            <div class="chat-empty-card">
                <svg class="chat-empty-icon"><use href="#i-shield"/></svg>
                <h3>Select a chat to start messaging</h3>
                <p>Or create a new one from the menu</p>
            </div>
        </div>

        <!-- chat content (hidden until chat is opened) -->
        <div id="chat-content" class="chat-content" style="display:none">
            <header class="chat-header">
                <button id="back-btn" class="icon-btn back-btn">
                    <svg><use href="#i-back"/></svg>
                </button>
                <div class="chat-header-info" id="chat-header-info">
                    <div class="avatar" id="chat-header-avatar">?</div>
                    <div class="chat-header-text">
                        <div class="chat-header-title" id="chat-header-title">—</div>
                        <div class="chat-header-status" id="chat-header-status"></div>
                    </div>
                </div>
                <button id="chat-call-btn" class="icon-btn" title="Voice call" style="display:none">
                    <svg><use href="#i-phone"/></svg>
                </button>
                <button id="chat-video-btn" class="icon-btn" title="Video call" style="display:none">
                    <svg><use href="#i-video"/></svg>
                </button>
                <button id="chat-menu-btn" class="icon-btn" title="More">
                    <svg><use href="#i-more"/></svg>
                </button>
            </header>

            <!-- Pinned bar -->
            <div id="pinned-bar" class="pinned-bar" style="display:none">
                <div class="pinned-bar-line"></div>
                <div class="pinned-bar-content">
                    <div class="pinned-bar-title">Pinned message</div>
                    <div id="pinned-bar-text" class="pinned-bar-text"></div>
                </div>
                <button id="pinned-unpin-btn" class="icon-btn small">
                    <svg><use href="#i-close"/></svg>
                </button>
            </div>

            <!-- Messages list -->
            <div id="messages" class="messages-list"></div>

            <!-- Scroll-to-bottom FAB -->
            <button id="scroll-bottom-btn" class="scroll-bottom-btn" style="display:none">
                <svg><use href="#i-arrow-down"/></svg>
                <span id="unread-pill" class="unread-pill" style="display:none">0</span>
            </button>

            <!-- Reply bar (above input) -->
            <div id="reply-bar" class="reply-bar" style="display:none">
                <svg><use href="#i-reply"/></svg>
                <div class="reply-bar-content">
                    <div class="reply-bar-name" id="reply-bar-name"></div>
                    <div class="reply-bar-text" id="reply-bar-text"></div>
                </div>
                <button class="icon-btn small" onclick="cancelReply()">
                    <svg><use href="#i-close"/></svg>
                </button>
            </div>

            <!-- Composer / input bar -->
            <footer class="composer">
                <button id="attach-btn" class="icon-btn" title="Attach">
                    <svg><use href="#i-attach"/></svg>
                </button>
                <input id="file-input" type="file" multiple style="display:none">
                <textarea id="msg-input" placeholder="Message" rows="1"></textarea>
                <button id="send-btn" class="icon-btn primary" title="Send" style="display:none">
                    <svg><use href="#i-send"/></svg>
                </button>
                <button id="video-msg-btn" class="icon-btn" title="Video message">
                    <svg><use href="#i-video-msg"/></svg>
                </button>
                <button id="mic-btn" class="icon-btn" title="Voice message (hold)">
                    <svg><use href="#i-mic"/></svg>
                </button>
            </footer>
        </div>
    </main>
</div>

<!-- ============= CONTEXT MENU ============= -->
<div id="ctx-menu" class="ctx-menu" style="display:none">
    <button data-action="reply"><svg><use href="#i-reply"/></svg><span>Reply</span></button>
    <button data-action="copy"><svg><use href="#i-copy"/></svg><span>Copy</span></button>
    <button data-action="edit" id="ctx-edit"><svg><use href="#i-pencil"/></svg><span>Edit</span></button>
    <button data-action="forward"><svg><use href="#i-forward"/></svg><span>Forward</span></button>
    <button data-action="pin" id="ctx-pin"><svg><use href="#i-pin"/></svg><span>Pin</span></button>
    <button data-action="select"><svg><use href="#i-check"/></svg><span>Select</span></button>
    <button data-action="delete" class="danger"><svg><use href="#i-trash"/></svg><span>Delete</span></button>
</div>

<!-- ============= MAIN MENU (sidebar burger) ============= -->
<div id="main-menu" class="dropdown-menu" style="display:none">
    <button data-action="new-group"><svg><use href="#i-users"/></svg><span>New Group</span></button>
    <button data-action="contacts"><svg><use href="#i-user-plus"/></svg><span>Contacts</span></button>
    <button data-action="settings"><svg><use href="#i-settings"/></svg><span>Settings</span></button>
    <button data-action="admin" id="menu-admin" style="display:none"><svg><use href="#i-shield"/></svg><span>Admin Panel</span></button>
    <button data-action="logout" class="danger"><svg><use href="#i-logout"/></svg><span>Logout</span></button>
    <div class="menu-signature">
        <a href="https://github.com/saeederamy" target="_blank" rel="noopener">Developed by Saeed Eramy</a>
    </div>
</div>

<!-- ============= CHAT MENU (chat header more button) ============= -->
<div id="chat-menu" class="dropdown-menu" style="display:none">
    <button data-action="search"><svg><use href="#i-search"/></svg><span>Search</span></button>
    <button data-action="info" id="chat-menu-info"><svg><use href="#i-users"/></svg><span>Group info</span></button>
    <button data-action="clear" class="danger"><svg><use href="#i-trash"/></svg><span>Clear history</span></button>
</div>

<!-- ============= MODAL: Generic ============= -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
    <div id="modal-box" class="modal-box"></div>
</div>

<!-- ============= PROFILE PANE (Telegram-style slide-in panel) ============= -->
<div id="profile-pane">
    <div class="profile-pane-header">
        <button class="profile-pane-close" onclick="closeProfilePane()">
            <svg><use href="#i-close"/></svg>
        </button>
        <div class="profile-pane-avatar-wrap">
            <div class="profile-pane-avatar" id="profile-pane-avatar">?</div>
            <h2 class="profile-pane-name" id="profile-pane-name">—</h2>
            <p class="profile-pane-status" id="profile-pane-status"></p>
        </div>
    </div>
    <div class="profile-pane-body">
        <div class="profile-pane-info" id="profile-pane-info"></div>
        <div class="media-tabs" id="media-tabs">
            <div class="media-tab active" data-mtab="media">Media <span class="media-tab-count" id="mtab-count-media">0</span></div>
            <div class="media-tab" data-mtab="files">Files <span class="media-tab-count" id="mtab-count-files">0</span></div>
            <div class="media-tab" data-mtab="voice">Voice <span class="media-tab-count" id="mtab-count-voice">0</span></div>
        </div>
        <div class="media-content" id="media-content"></div>
    </div>
</div>

<!-- ============= MODAL: Call ============= -->
<div id="call-modal" class="call-modal" style="display:none">
    <video id="remote-video" autoplay playsinline class="call-remote-video" style="display:none"></video>
    <video id="local-video" autoplay playsinline muted class="call-local-video" style="display:none"></video>
    <audio id="remote-audio" autoplay playsinline></audio>

    <div class="call-info">
        <div class="call-avatar" id="call-avatar">?</div>
        <h2 class="call-name" id="call-name">—</h2>
        <p class="call-status" id="call-status">Connecting…</p>
    </div>

    <div class="call-controls" id="call-controls">
        <!-- buttons inserted dynamically -->
    </div>
</div>

<!-- ============= LIGHTBOX ============= -->
<div id="lightbox" class="lightbox" style="display:none" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="event.stopPropagation();closeLightbox()">
        <svg><use href="#i-close"/></svg>
    </button>
    <div id="lightbox-content"></div>
</div>

<!-- ============= VIDEO MESSAGE RECORDER ============= -->
<div id="video-rec-modal" class="video-rec-modal" style="display:none">
    <div class="video-rec-preview" id="video-rec-preview">
        <video id="video-rec-preview-video" autoplay playsinline muted></video>
    </div>
    <div class="video-rec-info">
        <div class="video-rec-timer" id="video-rec-timer">0:00</div>
        <div class="video-rec-hint" id="video-rec-hint">Tap the red button to start recording</div>
    </div>
    <div class="video-rec-controls" id="video-rec-controls">
        <!-- buttons inserted dynamically -->
    </div>
</div>
