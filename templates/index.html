<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#121418">
    <title>Black Chat | Secure Messenger</title>
    <style>
        :root {
            --bg-base: #121418;       
            --bg-panel: #1e2026;      
            --bg-input: #292d36;      
            --border: #2f333d;
            
            --c-blue: #007aff;        
            --c-blue-hover: #005bb5;
            --c-red: #ff3b30;         
            --c-orange: #ff9500;      
            --c-white: #ffffff;
            --c-gray: #9ba1ad;
            
            --bubble-me: #007aff;
            --bubble-other: #292d36;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; outline: none; -webkit-tap-highlight-color: transparent;}
        body { display: flex; height: 100dvh; background: var(--bg-base); color: var(--c-white); overflow: hidden; }

        /* Login Screen */
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #121418; display:flex; justify-content:center; align-items:center; flex-direction: column; z-index: 9999; }
        .login-box { background: var(--bg-panel); border: 1px solid var(--border); padding: 40px; border-radius: 16px; text-align: center; width: 90%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-box h2 { margin-bottom: 25px; color: var(--c-white); font-weight: 600; }
        .login-box input { width: 100%; padding: 14px; margin-bottom: 15px; background: var(--bg-input); border: 1px solid var(--border); color: white; border-radius: 12px; font-size: 15px; text-align: center;}
        .login-box input:focus { border-color: var(--c-blue); }
        
        /* انیمیشن شیک دکمه‌ها */
        .login-box button { width: 100%; padding: 14px; background: var(--c-blue); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); font-size: 16px;}
        .login-box button:hover { background: var(--c-blue-hover); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 122, 255, 0.4); }
        .login-box button:active { transform: scale(0.95); }
        .dev-credit { margin-top: 25px; color: var(--c-gray); font-size: 12px; letter-spacing: 1px; }

        #app { display: none; width: 100%; height: 100%; }

        /* Sidebar */
        .sidebar { width: 320px; background: var(--bg-panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; transition: transform 0.3s; flex-shrink: 0; }
        .sidebar-header { display: flex; align-items: center; padding: 10px 15px; gap: 10px; height: 65px; border-bottom: 1px solid var(--border); flex-shrink: 0;}
        
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; background: transparent; border: none; color: var(--c-gray); cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 20px; transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); flex-shrink: 0;}
        .icon-btn:hover { background: var(--bg-input); color: var(--c-white); }
        .icon-btn:active { transform: scale(0.9); }
        
        .icon-btn.primary { background: var(--c-blue); color: white; }
        .icon-btn.primary:hover { background: var(--c-blue-hover); transform: scale(1.05); box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3);}

        .search-box { flex: 1; background: var(--bg-input); border-radius: 12px; display: flex; align-items: center; padding: 0 10px; height: 40px; }
        .search-box input { flex: 1; background: transparent; border: none; color: white; font-size: 14px; padding: 0 5px;}

        .chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item { display: flex; align-items: center; padding: 12px; cursor: pointer; gap: 15px; border-radius: 12px; margin-bottom: 5px; position: relative; transition: background 0.2s;}
        .chat-item:hover { background: var(--bg-input); }
        .chat-item.active { background: var(--c-blue); }
        
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--bg-base); display: flex; justify-content: center; align-items: center; font-size: 20px; border: 1px solid var(--border); flex-shrink: 0;}
        .chat-info { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        .chat-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--c-white); }
        .chat-preview { font-size: 13px; color: var(--c-gray); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item.active .chat-preview { color: #e0e0e0; }
        
        .unread-badge { background: var(--c-orange); color: white; font-size: 12px; font-weight: bold; padding: 2px 8px; border-radius: 12px; display: none; margin-right: auto;}

        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-base); min-width: 0; position: relative; background-size: cover; background-position: center;}
        
        .chat-header { height: 65px; background: var(--bg-panel); display: flex; align-items: center; padding: 0 15px; gap: 15px; border-bottom: 1px solid var(--border); z-index: 10; flex-shrink: 0;}
        .back-btn { display: none; }
        [dir="rtl"] .back-btn { transform: scaleX(-1); }

        .messages { flex: 1; padding: 20px 5%; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;}
        .msg-row { display: flex; width: 100%; position: relative; }
        .msg-row.out { justify-content: flex-start; } 
        .msg-row.in { justify-content: flex-end; }
        
        .bubble { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.5; position: relative; word-break: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.2); display: flex; flex-direction: column;}
        .msg-row.out .bubble { background: var(--bubble-me); border-bottom-right-radius: 4px; color: white;}
        .msg-row.in .bubble { background: var(--bubble-other); border-bottom-left-radius: 4px; color: white;}
        
        .sender-name { font-size: 12px; color: var(--c-orange); font-weight: bold; margin-bottom: 5px; display: block; }
        .msg-row.out .sender-name { display: none; }
        
        .delete-btn { position: absolute; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: var(--c-red); font-size: 20px; cursor: pointer; opacity: 0; transition: 0.2s; padding: 5px;}
        .msg-row.out .delete-btn { left: calc(100% + 5px); }
        .msg-row:hover .delete-btn { opacity: 1; }

        .bubble img, .bubble video { max-width: 100%; border-radius: 10px; margin-top: 5px; cursor: pointer; }
        .bubble audio { width: 240px; height: 40px; margin-top: 5px; outline: none; }
        .file-link { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; color: white; text-decoration: none; margin-top:5px; transition: 0.2s;}
        .file-link:hover { background: rgba(0,0,0,0.4); }
        .file-icon { font-size: 24px; }

        /* --- اصلاح Input Area برای موبایل --- */
        .input-area { 
            padding: 10px 15px; 
            padding-bottom: max(10px, env(safe-area-inset-bottom)); 
            background: var(--bg-panel); 
            display: flex; 
            align-items: flex-end; 
            gap: 10px; 
            border-top: 1px solid var(--border); 
            z-index: 10; 
            flex-shrink: 0;
            width: 100%;
            flex-wrap: nowrap; /* جلوگیری از بیرون زدن دکمه‌ها در موبایل */
        }
        .input-box { flex: 1; background: var(--bg-input); border-radius: 20px; display: flex; align-items: center; padding: 0 5px; min-height: 45px; min-width: 0;}
        .input-box input { flex: 1; background: transparent; border: none; color: white; font-size: 15px; padding: 10px; min-width: 0;}
        
        .action-btn { 
            width: 42px; height: 42px; border-radius: 50%; background: transparent; border: none; 
            color: var(--c-gray); font-size: 20px; display: flex; justify-content: center; align-items: center; 
            cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); flex-shrink: 0;
        }
        .action-btn:hover { color: var(--c-white); background: var(--bg-input); transform: scale(1.1); }
        .action-btn:active { transform: scale(0.9); } /* افکت فشردن دکمه */
        .action-btn.send { background: var(--c-blue); color: white; box-shadow: 0 2px 10px rgba(0, 122, 255, 0.4);}
        .action-btn.rec { background: var(--c-red); color: white; animation: pulse 1s infinite; box-shadow: 0 2px 10px rgba(255, 59, 48, 0.4);}
        
        .rec-timer { display: none; color: var(--c-red); font-weight: bold; font-family: monospace; font-size: 16px; padding: 0 10px; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

        /* Modals & Overlays */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .modal-box { background: var(--bg-panel); border: 1px solid var(--border); padding: 25px; border-radius: 16px; width: 90%; max-width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); display: flex; flex-direction: column; gap: 15px;}
        .modal-box h3 { color: var(--c-white); font-weight: 600;}
        .modal-box input, .modal-box select { width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border); color: white; border-radius: 10px; font-size: 14px;}
        .modal-actions { display: flex; gap: 10px; margin-top: 10px; }
        .modal-actions button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .btn-cancel { background: var(--bg-input); color: white; }
        .btn-cancel:hover { background: var(--border); }
        .btn-confirm { background: var(--c-blue); color: white; }
        .btn-confirm:hover { background: var(--c-blue-hover); }
        
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border);}
        .ip-list { max-height: 120px; overflow-y: auto; background: var(--bg-input); border-radius: 8px; padding: 10px; font-size: 12px; font-family: monospace; color: var(--c-orange); direction: ltr; text-align: left;}

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .sidebar { position: absolute; top:0; right:0; width: 100%; height: 100%; z-index: 50; }
            .sidebar.hidden { transform: translateX(100%); }
            .back-btn { display: flex; }
            .messages { padding: 20px 5%; }
            .bubble { max-width: 90%; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 data-i18n="login_title">ورود به سیستم</h2>
            <input type="text" id="username" placeholder="Username" autocomplete="off" autocapitalize="none" dir="ltr">
            <input type="password" id="password" placeholder="Password" dir="ltr">
            <button onclick="login()" data-i18n="btn_login">ورود / تایید</button>
        </div>
        <div class="dev-credit">Developed by saeed eramy</div>
    </div>

    <div id="app">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="icon-btn" onclick="openModal('settingsModal')" title="تنظیمات">⚙️</button>
                <div class="search-box">
                    <input type="text" id="searchInput" data-i18n-ph="search_ph" placeholder="جستجو..." onkeyup="searchChat()">
                </div>
                <button class="icon-btn primary" onclick="openModal('contactModal')" title="چت جدید">➕</button>
            </div>
            <div class="chat-list" id="chat-list"></div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="chat-header">
                <button class="icon-btn back-btn" onclick="closeChat()">➔</button>
                <div class="avatar" id="header-avatar" style="width:42px;height:42px;">📢</div>
                <div style="display:flex; flex-direction:column; justify-content:center;">
                    <h3 id="room-title" style="font-size:16px; font-weight:600;"></h3>
                    <span id="room-status" style="font-size:12px; color:var(--c-blue);"></span>
                </div>
            </div>
            
            <div class="messages" id="messages"></div>
            
            <div class="input-area" id="input-area">
                <input type="file" id="fileInput" style="display:none" onchange="uploadFile()">
                <button class="action-btn" onclick="document.getElementById('fileInput').click()">📎</button>
                
                <div class="input-box">
                    <span class="rec-timer" id="recTimer" dir="ltr">00:00</span>
                    <input type="text" id="msgInput" data-i18n-ph="type_ph" placeholder="پیام خود را بنویسید..." autocomplete="off" oninput="checkInput()">
                </div>
                
                <button class="action-btn" id="actionVideoBtn" onclick="startRecord('video', this)" title="ویدیو مسیج">📷</button>
                <button class="action-btn" id="actionBtn" onclick="handleAction()" title="صدا / ارسال">🎤</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="contactModal">
        <div class="modal-box">
            <h3 data-i18n="add_contact">چت خصوصی جدید</h3>
            <input type="text" id="contactUsername" data-i18n-ph="username_ph" placeholder="آیدی دقیق شخص را وارد کنید" dir="ltr">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('contactModal')">لغو</button>
                <button class="btn-confirm" onclick="submitContact()">شروع چت</button>
            </div>
            <hr style="border:0; border-top:1px solid var(--border); margin: 10px 0;">
            <h3>گروه یا کانال جدید</h3>
            <select id="creationType">
                <option value="group">گروه عمومی</option>
                <option value="channel">کانال عمومی</option>
            </select>
            <input type="text" id="creationName" placeholder="نام گروه/کانال">
            <button class="btn-confirm" onclick="submitCreation()" style="width:100%; padding:12px; border-radius:10px; border:none; margin-top:5px;">ایجاد</button>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-box" style="max-width: 450px;">
            <h3 data-i18n="settings">تنظیمات سیستم</h3>
            
            <div class="toggle-row">
                <span data-i18n="language">زبان برنامه</span>
                <select id="langSelect" onchange="changeLang(this.value)" style="width:120px; padding:6px; margin:0;">
                    <option value="fa">فارسی</option>
                    <option value="en">English</option>
                </select>
            </div>
            
            <div class="toggle-row">
                <span data-i18n="auto_dl">دانلود خودکار مدیا</span>
                <input type="checkbox" id="autoDlToggle" style="width:auto; transform:scale(1.5);" checked onchange="toggleAutoDl(this.checked)">
            </div>
            
            <div class="toggle-row" style="flex-direction:column; align-items:flex-start; gap:10px;">
                <span data-i18n="chat_bg">پس‌زمینه چت (لینک عکس)</span>
                <input type="text" id="bgInput" placeholder="https://..." onchange="changeBg(this.value)" dir="ltr">
            </div>
            
            <div style="margin-top:10px;">
                <span style="font-size:13px; color:var(--c-gray);" data-i18n="active_sessions">آی‌پی‌های متصل شما</span>
                <div class="ip-list" id="ipList"></div>
            </div>
            
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('settingsModal')" style="flex: 2;">بستن</button>
                <button class="btn-confirm" onclick="location.reload()" style="flex: 1; background:var(--c-red);">خروج</button>
            </div>
        </div>
    </div>

    <audio id="notif-sound" src="data:audio/mp3;base64,//NExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq" preload="auto"></audio>
    <script src="/static/script.js"></script>
</body>
</html>
