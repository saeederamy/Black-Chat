<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#111318">
    <title>Black Chat | V 1.0.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        /* Black Hub + Telegram Theme */
        :root {
            --bg-base: #111318;       
            --bg-panel: #1b1d24;      
            --bg-input: #232730;      
            --border: rgba(255, 255, 255, 0.08);
            
            --c-blue: #007aff;        
            --c-blue-hover: #005bb5;
            --c-red: #ff3b30;         
            --c-orange: #ff9500;      
            --c-white: #ffffff;
            --c-gray: #a3a6ad;
            
            --bubble-me: #007aff;
            --bubble-other: #232730;
        }

        /* Light Mode Fix */
        [data-theme="light"] {
            --bg-base: #e5e5ea;       
            --bg-panel: #ffffff;      
            --bg-input: #f0f0f5;      
            --border: rgba(0, 0, 0, 0.1);
            
            --c-white: #1c1c1e; 
            --c-gray: #8e8e93;
            
            --bubble-me: #007aff;
            --bubble-other: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; outline: none; -webkit-tap-highlight-color: transparent;}
        body { display: flex; height: 100dvh; background: var(--bg-base); color: var(--c-white); overflow: hidden; transition: background 0.3s, color 0.3s; }

        /* Login */
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-base); display:flex; justify-content:center; align-items:center; flex-direction: column; z-index: 9999; }
        .login-box { background: var(--bg-panel); border: 1px solid var(--border); padding: 40px; border-radius: 24px; text-align: center; width: 90%; max-width: 360px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
        .login-box h2 { margin-bottom: 25px; font-weight: 700; color: var(--c-blue); }
        .login-box input { width: 100%; padding: 14px; margin-bottom: 15px; background: var(--bg-input); border: 1px solid var(--border); color: var(--c-white); border-radius: 12px; font-size: 15px; text-align: center; transition: 0.3s;}
        .login-box input:focus { border-color: var(--c-blue); }
        .login-box button { width: 100%; padding: 14px; background: var(--c-blue); color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 16px;}
        .login-box button:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,122,255,0.4); }
        .dev-credit { margin-top: 30px; color: var(--c-gray); font-size: 12px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }

        #app { display: none; width: 100%; height: 100%; }

        /* Sidebar */
        .sidebar { width: 340px; background: var(--bg-panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; transition: transform 0.3s; flex-shrink: 0; }
        
        .sidebar-header { display: flex; align-items: center; padding: 15px; gap: 10px; height: 65px; border-bottom: 1px solid var(--border); flex-shrink: 0;}
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; background: transparent; border: none; color: var(--c-gray); cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 20px; transition: 0.2s; flex-shrink: 0;}
        .icon-btn:hover { background: var(--bg-input); color: var(--c-blue); }
        
        .search-box { flex: 1; background: var(--bg-input); border-radius: 20px; display: flex; align-items: center; padding: 0 10px; height: 40px; min-width: 0; border: 1px solid var(--border);}
        .search-box input { flex: 1; background: transparent; border: none; color: var(--c-white); font-size: 14px; padding: 0 5px; min-width: 0;}

        .chat-list { flex: 1; overflow-y: auto; padding: 10px 5px; }
        .chat-item { display: flex; align-items: center; padding: 12px 10px; cursor: pointer; gap: 12px; border-radius: 16px; margin-bottom: 2px; position: relative; transition: 0.2s;}
        .chat-item:hover { background: var(--bg-input); }
        .chat-item.active { background: rgba(0,122,255,0.15); }
        
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--c-blue); color: #fff; display: flex; justify-content: center; align-items: center; font-size: 20px; flex-shrink: 0; overflow: hidden; border: 1px solid var(--border);}
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .chat-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center;}
        .chat-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--c-white); }
        .chat-preview { font-size: 13px; color: var(--c-gray); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .unread-badge { background: var(--c-orange); color: white; font-size: 12px; font-weight: bold; padding: 2px 8px; border-radius: 12px; display: none;}

        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-base); min-width: 0; min-height: 0; position: relative; background-size: cover; background-position: center;}
        
        .chat-header { height: 65px; background: rgba(27, 29, 36, 0.85); backdrop-filter: blur(20px); display: flex; align-items: center; padding: 0 15px; gap: 15px; border-bottom: 1px solid var(--border); z-index: 10; flex-shrink: 0;}
        [data-theme="light"] .chat-header { background: rgba(255,255,255,0.85); }
        .back-btn { display: none; }
        [dir="rtl"] .back-btn { transform: scaleX(-1); }

        .messages { flex: 1; padding: 20px 5%; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; min-height: 0;}
        
        .msg-row { display: flex; width: 100%; position: relative; align-items: flex-end;}
        .msg-row.out { justify-content: flex-start; } 
        .msg-row.in { justify-content: flex-end; }
        
        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 24px; font-size: 15px; line-height: 1.5; position: relative; word-break: break-word; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; cursor: pointer; transition: 0.3s; border: 1px solid var(--border);}
        .msg-row.out .bubble { background: var(--bubble-me); color: #fff; border-bottom-right-radius: 6px; }
        .msg-row.in .bubble { background: var(--bubble-other); color: var(--c-white); border-bottom-left-radius: 6px;}
        .bubble.selected-msg { border: 2px solid var(--c-orange); background: rgba(255,149,0,0.2) !important; }
        
        /* افکت پرش موقع کلیک روی ریپلای */
        .highlight-msg { animation: highlight-blink 2s ease; }
        @keyframes highlight-blink { 0%, 100% { transform: scale(1); box-shadow: none; } 50% { transform: scale(1.02); box-shadow: 0 0 20px var(--c-orange); } }

        .sender-name { font-size: 12px; color: var(--c-orange); font-weight: bold; margin-bottom: 4px; display: block; }
        .msg-row.out .sender-name { display: none; }

        .reply-preview { background: rgba(0,0,0,0.2); border-right: 3px solid var(--c-orange); padding: 5px 10px; border-radius: 12px; margin-bottom: 6px; font-size: 13px; cursor: pointer;}
        [dir="rtl"] .reply-preview { border-right: 3px solid var(--c-orange); border-left: none; }

        .reactions-bar { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap;}
        .react-badge { background: var(--bg-panel); border-radius: 12px; padding: 2px 8px; font-size: 13px; cursor: pointer; border: 1px solid var(--border);}
        .react-badge.mine { border-color: var(--c-blue); background: rgba(0,122,255,0.2); }

        /* Media in chat */
        .bubble img { max-width: 100%; border-radius: 16px; margin-top: 5px; border: 1px solid rgba(255,255,255,0.1); }
        .bubble audio { width: 250px; height: 40px; margin-top: 5px; outline: none; }
        .file-link { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 16px; color: var(--c-white); text-decoration: none; margin-top:5px; border: 1px solid var(--border);}
        
        /* Video Message (Telegram Circular) */
        .video-msg { width: 240px; height: 240px; border-radius: 50%; object-fit: cover; border: 3px solid var(--c-blue); margin-top: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* Video Preview Recording */
        #videoPreview { display: none; position: absolute; bottom: 85px; right: 20px; width: 220px; height: 220px; border-radius: 50%; object-fit: cover; border: 4px solid var(--c-red); box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 100; transform: scaleX(-1); background: #000;}
        [dir="rtl"] #videoPreview { right: auto; left: 20px; }

        /* --- Context Menu & Selections --- */
        .context-menu { position: fixed; background: rgba(20,20,20,0.9); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 16px; width: 220px; display: none; flex-direction: column; z-index: 5000; box-shadow: 0 10px 40px rgba(0,0,0,0.8); padding: 8px; }
        [data-theme="light"] .context-menu { background: rgba(255,255,255,0.9); }
        .context-menu button { background: transparent; border: none; color: var(--c-white); padding: 12px; text-align: left; border-radius: 10px; cursor: pointer; font-size: 14px; transition: 0.2s;}
        [dir="rtl"] .context-menu button { text-align: right; }
        .context-menu button:hover { background: rgba(128,128,128,0.2); }
        .context-menu button.danger { color: var(--c-red); }
        .emoji-bar { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--border); margin-bottom: 5px;}
        .emoji-bar span { font-size: 22px; cursor: pointer; transition: 0.2s; }
        .emoji-bar span:hover { transform: scale(1.3); }

        #multiSelectBar { display: none; position: absolute; bottom: 0; left: 0; width: 100%; background: var(--bg-panel); z-index: 50; padding: 15px 20px; padding-bottom: max(15px, env(safe-area-inset-bottom)); border-top: 1px solid var(--border); align-items: center; justify-content: space-between;}
        #multiSelectBar button { background: transparent; color: var(--c-white); border: 1px solid var(--border); padding: 10px 15px; border-radius: 12px; cursor: pointer; transition: 0.2s;}

        /* --- Input Area --- */
        .input-wrapper-container { background: var(--bg-panel); padding: 10px 15px; padding-bottom: max(10px, env(safe-area-inset-bottom)); display: flex; flex-direction: column; border-top: 1px solid var(--border); z-index: 10; flex-shrink: 0; width: 100%;}
        
        #replyBar { display: none; background: var(--bg-input); border-right: 3px solid var(--c-blue); border-radius: 12px; padding: 8px 12px; margin-bottom: 10px; position: relative;}
        [dir="rtl"] #replyBar { border-right: 3px solid var(--c-blue); border-left: none; }
        
        .input-area-row { display: flex; align-items: center; gap: 8px; width: 100%; }
        .input-box { flex: 1; background: var(--bg-input); border-radius: 24px; border: 1px solid var(--border); display: flex; align-items: center; padding: 0 5px; min-height: 48px; min-width: 0;}
        .input-box input { flex: 1; background: transparent; border: none; color: var(--c-white); font-size: 15px; padding: 10px; min-width: 0;}
        
        .action-btn { width: 44px; height: 44px; border-radius: 50%; background: transparent; border: none; color: var(--c-gray); font-size: 20px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; flex-shrink: 0;}
        .action-btn:hover { color: var(--c-white); background: var(--bg-input); }
        .action-btn.send { background: var(--c-blue); color: white; }
        .action-btn.rec { background: var(--c-red); color: white; animation: pulse 1s infinite; }
        
        /* کنترل ویس (Pause/Play) */
        .rec-controls { display: none; align-items: center; flex: 1; justify-content: space-between; padding: 0 10px;}
        .rec-timer { color: var(--c-red); font-weight: bold; font-family: monospace; font-size: 16px; animation: blink 1s infinite;}
        
        /* --- WebRTC Call Modal --- */
        #callModal { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(30, 32, 41, 0.95); backdrop-filter: blur(20px); border: 1px solid var(--c-blue); padding: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); z-index: 9999; display: none; flex-direction: column; align-items: center; gap: 15px; width: 280px; text-align: center;}
        [data-theme="light"] #callModal { background: rgba(255,255,255,0.95); }
        #callAvatar { width: 80px; height: 80px; border-radius: 50%; background: var(--c-blue); display: flex; justify-content: center; align-items: center; font-size: 30px; color: white; animation: pulseCall 1.5s infinite;}
        .call-btns { display: flex; gap: 20px; width: 100%; justify-content: center;}
        .call-btn { width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; display: flex; justify-content: center; align-items: center;}
        .btn-ans { background: #34c759; color: white; }
        .btn-rej { background: var(--c-red); color: white; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes pulseCall { 0% { box-shadow: 0 0 0 0 rgba(0,122,255,0.7); } 70% { box-shadow: 0 0 0 20px rgba(0,122,255,0); } 100% { box-shadow: 0 0 0 0 rgba(0,122,255,0); } }

        /* --- Modals --- */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .modal-box { background: var(--bg-panel); border: 1px solid var(--border); padding: 25px; border-radius: 24px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px;}
        .modal-box input, .modal-box select { width: 100%; padding: 14px; background: var(--bg-input); border: 1px solid var(--border); color: var(--c-white); border-radius: 12px; font-size: 15px;}
        
        /* Profile Tabs */
        .profile-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .tab-btn { flex: 1; background: none; border: none; color: var(--c-gray); padding: 10px; cursor: pointer; font-weight: bold; border-bottom: 2px solid transparent;}
        .tab-btn.active { color: var(--c-blue); border-bottom-color: var(--c-blue); }
        .tab-content { max-height: 250px; overflow-y: auto; display: none; gap: 10px; flex-wrap: wrap;}
        .tab-content.active { display: flex; }
        .media-grid-item { width: 30%; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border);}
        
        /* Custom Group Selection */
        .contact-list-box { max-height: 200px; overflow-y: auto; padding: 5px;}
        .custom-checkbox { display: flex; align-items: center; gap: 15px; padding: 10px; border-radius: 12px; cursor: pointer; transition: 0.2s;}
        .custom-checkbox:hover { background: var(--bg-input); }
        .custom-checkbox input { display: none; }
        .checkmark { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--c-gray); display: flex; justify-content: center; align-items: center; transition: 0.2s;}
        .custom-checkbox input:checked + .checkmark { background: var(--c-blue); border-color: var(--c-blue); }
        .custom-checkbox input:checked + .checkmark::after { content: '✓'; color: white; font-size: 14px;}

        .modal-actions { display: flex; gap: 10px; margin-top: 10px; }
        .modal-actions button { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer;}
        .btn-cancel { background: var(--bg-input); color: var(--c-white); border: 1px solid var(--border);}
        .btn-confirm { background: var(--c-blue); color: #fff; }

        @media (max-width: 768px) {
            .sidebar { position: absolute; top:0; right:0; width: 100%; height: 100%; z-index: 50; }
            .sidebar.hidden { transform: translateX(100%); }
            .back-btn { display: flex !important; }
            .messages { padding: 15px; }
            .bubble { max-width: 92%; }
            #videoPreview { width: 160px; height: 160px; bottom: 85px; right: 10px;}
            [dir="rtl"] #videoPreview { left: 10px; right: auto;}
        }
    </style>
</head>
<body>

    <svg style="display:none;">
        <symbol id="icon-back" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></symbol>
        <symbol id="icon-attach" viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></symbol>
        <symbol id="icon-mic" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></symbol>
        <symbol id="icon-cam" viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></symbol>
        <symbol id="icon-send" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></symbol>
        <symbol id="icon-doc" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></symbol>
        <symbol id="icon-call" viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 0 0-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></symbol>
        <symbol id="icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></symbol>
        <symbol id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></symbol>
    </svg>

    <div id="login-screen">
        <div class="login-box">
            <h2 data-i18n="login_title">ورود به سیستم</h2>
            <input type="text" id="username" placeholder="Username" autocomplete="off" autocapitalize="none" dir="ltr">
            <input type="password" id="password" placeholder="Password" dir="ltr">
            <button onclick="login()" data-i18n="btn_login">ورود / تایید</button>
        </div>
        <div class="dev-credit">Developed by saeed eramy</div>
    </div>

    <div id="app">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="icon-btn" onclick="openModal('settingsModal')" title="تنظیمات">⚙️</button>
                <button class="icon-btn" onclick="toggleTheme()" title="تغییر تم">🌓</button>
                <div class="search-box">
                    <input type="text" id="searchInput" data-i18n-ph="search_ph" placeholder="جستجو..." onkeyup="searchChat()">
                </div>
                <button class="icon-btn primary" onclick="openModal('contactModal')" title="چت یا گروه جدید">➕</button>
            </div>
            <div class="chat-list" id="chat-list"></div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="chat-header">
                <button class="icon-btn back-btn" onclick="closeChat()"><svg style="width:24px;fill:currentColor;"><use href="#icon-back"></use></svg></button>
                <div class="avatar" id="header-avatar" style="width:42px;height:42px; cursor:pointer;" onclick="openProfile()">📢</div>
                <div style="display:flex; flex-direction:column; justify-content:center; flex:1; cursor:pointer;" onclick="openProfile()">
                    <h3 id="room-title" style="font-size:16px; font-weight:600;"></h3>
                    <span id="room-status" style="font-size:12px; color:var(--c-blue);"></span>
                </div>
                <button class="icon-btn" id="callBtn" onclick="startCall()" style="display:none;"><svg style="width:24px;fill:currentColor;"><use href="#icon-call"></use></svg></button>
            </div>
            
            <div class="messages" id="messages" onclick="closeContextMenu()"></div>
            
            <video id="videoPreview" autoplay muted playsinline></video>

            <div id="multiSelectBar">
                <span id="selectCount" style="font-weight:bold;">1 پیام</span>
                <div style="display:flex; gap:10px;">
                    <button onclick="forwardSelected()" class="icon-btn primary" style="width:auto; padding:0 15px; border-radius:12px;">هدایت</button>
                    <button onclick="deleteSelected()" class="icon-btn" style="color:var(--c-red); width:auto; padding:0 15px; border-radius:12px; border:1px solid var(--c-red);">حذف</button>
                    <button onclick="cancelSelection()" class="icon-btn" style="width:auto; padding:0 15px; border-radius:12px; border:1px solid var(--border);">لغو</button>
                </div>
            </div>

            <div class="input-wrapper-container" id="input-container">
                <div id="replyBar">
                    <div style="color:var(--c-blue); font-size:13px; font-weight:bold;" id="replySender"></div>
                    <div style="color:var(--c-gray); font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" id="replyText"></div>
                    <span onclick="cancelReply()" style="position:absolute; left:10px; top:10px; cursor:pointer; color:var(--c-gray); font-size:16px;">✖</span>
                </div>
                
                <div class="input-area-row">
                    <input type="file" id="fileInput" style="display:none" onchange="uploadFile()">
                    <button class="action-btn" onclick="document.getElementById('fileInput').click()" id="attachBtn">
                        <svg style="width:24px;fill:currentColor;"><use href="#icon-attach"></use></svg>
                    </button>
                    
                    <div class="input-box" id="textInputBox">
                        <input type="text" id="msgInput" data-i18n-ph="type_ph" placeholder="پیام خود را بنویسید..." autocomplete="off" oninput="checkInput()">
                    </div>
                    
                    <div class="rec-controls" id="recControls">
                        <button class="action-btn" onclick="cancelRecord()" style="color:var(--c-gray);">✖</button>
                        <span class="rec-timer" id="recTimer" dir="ltr">00:00</span>
                        <button class="action-btn" id="pauseRecBtn" onclick="pauseResumeRecord()" style="color:var(--c-blue);">
                            <svg style="width:24px;fill:currentColor;"><use href="#icon-pause"></use></svg>
                        </button>
                    </div>
                    
                    <button class="action-btn" id="actionVideoBtn" onclick="startRecord('video', this)">
                        <svg style="width:24px;fill:currentColor;"><use href="#icon-cam"></use></svg>
                    </button>
                    <button class="action-btn" id="actionBtn" onclick="handleAction()">
                        <svg style="width:24px;fill:currentColor;"><use href="#icon-mic"></use></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="msgContextMenu" class="context-menu">
        <div class="emoji-bar">
            <span onclick="sendReaction('👍')">👍</span>
            <span onclick="sendReaction('❤️')">❤️</span>
            <span onclick="sendReaction('😂')">😂</span>
            <span onclick="sendReaction('🙏')">🙏</span>
            <span onclick="sendReaction('😢')">😢</span>
        </div>
        <button onclick="doReply()">↩️ پاسخ</button>
        <button onclick="doCopy()">📋 کپی متن</button>
        <button onclick="doSelect()">☑️ انتخاب چندتایی</button>
        <button onclick="doDeleteMsg()" style="color:var(--c-red);">🗑 حذف پیام</button>
    </div>

    <div id="callModal">
        <div id="callAvatar" style="font-size:40px; margin-bottom:10px;">📞</div>
        <h3 id="callStatusText" style="color:white;">تماس ورودی...</h3>
        <p id="callUserText" style="color:var(--c-gray);"></p>
        <audio id="remoteAudio" autoplay></audio>
        <div class="call-btns" id="callBtns">
            <button class="call-btn btn-ans" onclick="acceptCall()">📞</button>
            <button class="call-btn btn-rej" onclick="endCall()">✖</button>
        </div>
    </div>

    <div class="modal-overlay" id="contactModal">
        <div class="modal-box">
            <h3 data-i18n="add_contact">چت یا گروه جدید</h3>
            <input type="text" id="contactUsername" data-i18n-ph="username_ph" placeholder="آیدی دقیق شخص" dir="ltr">
            <button class="btn-confirm" onclick="submitContact()" style="padding:14px; border-radius:12px; border:none; width:100%;">شروع چت</button>
            
            <hr style="border:0; border-top:1px solid var(--border); margin: 15px 0;">
            
            <h3 style="color:var(--c-blue);">ساخت گروه خصوصی</h3>
            <input type="text" id="creationName" placeholder="نام گروه">
            <div class="contact-list-box" id="groupMembersList"></div>
            
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('contactModal')">لغو</button>
                <button class="btn-confirm" onclick="submitCreation()">ساخت گروه</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="profileModal">
        <div class="modal-box" style="max-height:80vh;">
            <div style="text-align:center;">
                <div class="avatar" id="prof-avatar" style="width:100px; height:100px; margin: 0 auto; font-size:40px;">👤</div>
                <h3 id="prof-name" style="margin-top:15px;">نام</h3>
            </div>
            
            <div class="profile-tabs">
                <button class="tab-btn active" onclick="switchTab('media')">رسانه</button>
                <button class="tab-btn" onclick="switchTab('files')">فایل‌ها</button>
                <button class="tab-btn" onclick="switchTab('links')">لینک‌ها</button>
            </div>
            
            <div id="tab-media" class="tab-content active"></div>
            <div id="tab-files" class="tab-content" style="flex-direction:column;"></div>
            <div id="tab-links" class="tab-content" style="flex-direction:column;"></div>
            
            <button class="btn-cancel" onclick="closeModal('profileModal')" style="padding:12px; border-radius:12px; border:none; width:100%; margin-top:10px;">بستن</button>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-box" style="max-width: 450px;">
            <div style="text-align:center; margin-bottom:20px;">
                <div class="avatar" style="width:80px; height:80px; margin: 0 auto; cursor:pointer;" onclick="document.getElementById('avatarInput').click()">
                    <img id="my-avatar" src="" style="display:none;">
                    <span id="my-initial">📷</span>
                </div>
                <input type="file" id="avatarInput" style="display:none" accept="image/*" onchange="uploadAvatar()">
                <h3 style="margin-top:10px;">تنظیمات من</h3>
            </div>
            
            <div class="toggle-row">
                <span data-i18n="language">زبان برنامه</span>
                <select id="langSelect" onchange="changeLang(this.value)" style="width:120px; padding:6px; margin:0;">
                    <option value="fa">فارسی</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="toggle-row">
                <span data-i18n="auto_dl">دانلود خودکار مدیا</span>
                <input type="checkbox" id="autoDlToggle" style="width:auto; transform:scale(1.5);" checked onchange="toggleAutoDl(this.checked)">
            </div>
            <div class="toggle-row" style="flex-direction:column; align-items:flex-start; gap:10px;">
                <span data-i18n="chat_bg">پس‌زمینه چت (لینک عکس)</span>
                <input type="text" id="bgInput" placeholder="https://..." onchange="changeBg(this.value)" dir="ltr">
            </div>
            <div style="margin-top:10px;">
                <span style="font-size:13px; color:var(--c-gray);" data-i18n="active_sessions">آی‌پی‌های متصل شما</span>
                <div class="ip-list" id="ipList"></div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('settingsModal')" style="flex: 2;">بستن</button>
                <button class="btn-confirm" onclick="location.reload()" style="flex: 1; background:var(--c-red);">خروج</button>
            </div>
        </div>
    </div>

    <audio id="notif-sound" src="data:audio/mp3;base64,//NExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq" preload="auto"></audio>
    <script src="/static/script.js"></script>
</body>
</html>
