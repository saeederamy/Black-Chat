<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Black Chat | Secure Workspace</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap');
        
        :root { 
            --bg-dark: #000000; 
            --glass-bg: rgba(20, 20, 20, 0.6); 
            --glass-border: rgba(255, 255, 255, 0.15); 
            --accent: #ffffff; 
            --accent-glow: rgba(255, 255, 255, 0.3);
            --text-main: #ffffff; 
            --text-muted: #888888;
            --bubble-self: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
            --bubble-other: rgba(25, 25, 25, 0.8);
            --input-bg: rgba(0, 0, 0, 0.6);
        }
        
        body { 
            margin: 0; display: flex; height: 100vh; background: var(--bg-dark); color: var(--text-main); font-family: 'Inter', Tahoma, sans-serif;
            background: linear-gradient(45deg, #000000, #0a0a0a, #111111, #000000); background-size: 400% 400%; animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        
        /* دکمه‌های براق و شیشه‌ای (Glossy Buttons) */
        .btn-glossy {
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 100%);
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 4px 10px rgba(0,0,0,0.5);
            color: var(--accent);
            border-radius: 12px; cursor: pointer; transition: 0.3s; font-family: 'Inter'; font-weight: 600;
        }
        .btn-glossy:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent-glow); transform: translateY(-2px); }

        .sidebar { width: 300px; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid var(--glass-border); text-align: center; }
        .sidebar-header h3 { margin: 0; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; font-weight: 800; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .sidebar-header p { margin: 5px 0 0 0; font-size: 0.85rem; color: var(--text-muted); }
        
        .chat-list { flex: 1; overflow-y: auto; padding: 15px; }
        .section-title { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; margin: 15px 0 10px 5px; font-weight: bold; letter-spacing: 1px; }
        
        .chat-item { display: flex; align-items: center; gap: 10px; padding: 12px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .chat-item:hover { background: rgba(255, 255, 255, 0.05); border-color: var(--glass-border); }
        .chat-item.active { background: rgba(255, 255, 255, 0.1); border: 1px solid var(--glass-border); box-shadow: inset 0 1px 0 rgba(255,255,255,0.2); }
        
        /* نشانگر پیام نخوانده */
        .chat-item.unread::after { content: ''; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; margin-left: auto; box-shadow: 0 0 10px var(--accent-glow); animation: pulse 2s infinite; }
        @keyframes pulse { 0% {transform: scale(0.8); opacity: 0.8;} 50% {transform: scale(1.2); opacity: 1;} 100% {transform: scale(0.8); opacity: 0.8;} }

        .chat-icon { width: 38px; height: 38px; border-radius: 10px; background: rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center; font-size: 1.2rem; border: 1px solid var(--glass-border); }
        .chat-name { font-weight: 500; letter-spacing: 0.5px; }

        .logout-btn { margin: 15px; padding: 14px; text-align: center; text-decoration: none; text-transform: uppercase; letter-spacing: 1px;}

        .chat-container { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-header { padding: 20px; background: var(--glass-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; gap: 15px; z-index: 5; }
        .chat-header h2 { margin: 0; font-size: 1.2rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}
        
        .messages-wrapper { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .message-row { display: flex; width: 100%; }
        .message-row.self { justify-content: flex-end; }
        .message-row.other { justify-content: flex-start; }
        
        .bubble { max-width: 65%; padding: 14px 18px; border-radius: 16px; position: relative; line-height: 1.5; border: 1px solid var(--glass-border); word-break: break-word; backdrop-filter: blur(10px); }
        .message-row.self .bubble { background: var(--bubble-self); border-bottom-right-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.3); }
        .message-row.other .bubble { background: var(--bubble-other); border-bottom-left-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        .msg-sender { font-size: 0.75rem; color: #bbbbbb; font-weight: bold; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 1px;}
        .message-row.self .msg-sender { display: none; }
        
        .bubble img, .bubble video { max-width: 100%; border-radius: 8px; margin-top: 8px; border: 1px solid var(--glass-border); }
        .bubble audio { margin-top: 8px; width: 250px; outline: none; }
        .file-link { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 8px; text-decoration: none; color: var(--accent); border: 1px solid var(--glass-border); margin-top: 5px; transition: 0.3s; font-weight: 600; }
        .file-link:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent-glow); }

        .input-area { padding: 20px; background: var(--glass-bg); backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border); display: flex; gap: 12px; align-items: center; z-index: 5; }
        .input-box { flex: 1; display: flex; align-items: center; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 8px 15px; transition: 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        .input-box:focus-within { border-color: var(--accent); box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 0 15px rgba(255,255,255,0.1); }
        .input-box input[type="text"] { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; padding: 10px 5px; font-family: 'Inter'; letter-spacing: 0.5px; }
        
        .action-btn { font-size: 1.2rem; padding: 12px; display: flex; align-items: center; justify-content: center; }

        /* استایل‌های نوتیفیکیشن تلگرامی (Toast) */
        #toast-container { position: fixed; bottom: 25px; right: 25px; display: flex; flex-direction: column; gap: 12px; z-index: 9999; }
        .toast { 
            background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-left: 4px solid var(--accent); padding: 16px 20px; border-radius: 12px; 
            color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; gap: 5px; 
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; cursor: pointer; min-width: 250px;
        }
        .toast:hover { background: rgba(30, 30, 30, 0.95); }
        .toast-title { font-weight: 800; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        .toast-body { font-size: 0.9rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px; }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: scale(0.9); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>Black Hub</h3>
            <p>@{{ username }}</p>
        </div>
        
        <div class="chat-list">
            <div class="section-title">Channels</div>
            <div class="chat-item active" data-room="Announcements" onclick="joinRoom('Announcements', 'channel', this)">
                <div class="chat-icon">📢</div><div class="chat-name">Announcements</div>
            </div>

            <div class="section-title">Groups</div>
            <div class="chat-item" data-room="General" onclick="joinRoom('General', 'group', this)">
                <div class="chat-icon">🌍</div><div class="chat-name">General Chat</div>
            </div>
            <div class="chat-item" data-room="Dev_Team" onclick="joinRoom('Dev_Team', 'group', this)">
                <div class="chat-icon">💻</div><div class="chat-name">Dev Team</div>
            </div>

            <div class="section-title">Direct Messages</div>
            {% for u in all_users %}
                {% if u != username %}
                <div class="chat-item" data-user="{{ u }}" onclick="joinPrivateChat('{{ u }}', this)">
                    <div class="chat-icon">👤</div><div class="chat-name">{{ u }}</div>
                </div>
                {% endif %}
            {% endfor %}
        </div>
        <a href="/logout" class="btn-glossy logout-btn" style="color:#fff; border-color:rgba(255,255,255,0.2);">Disconnect</a>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-icon" id="header-icon" style="background:transparent; border:none;">📢</div>
            <h2 id="room-name">Announcements</h2>
        </div>
        
        <div class="messages-wrapper" id="messages"></div>
        
        <div class="input-area">
            <input type="file" id="fileInput" style="display:none" onchange="uploadFile()">
            <button class="btn-glossy action-btn" onclick="document.getElementById('fileInput').click()" title="Attach Document/Media">📎</button>
            <div class="input-box">
                <input type="text" id="msgInput" placeholder="Write a secure message..." autocomplete="off" onkeypress="handleEnter(event)">
            </div>
            <button class="btn-glossy action-btn" onclick="sendText()" style="padding: 12px 20px;">SEND ➤</button>
        </div>
    </div>

    <div id="toast-container"></div>
    
    <audio id="notif-sound" src="data:audio/mp3;base64,//NExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq" preload="auto"></audio>

    <script>
        const socket = io();
        const currentUser = "{{ username }}";
        let currentRoom = 'Announcements';
        
        socket.on('connect', () => { socket.emit('join', {room: currentRoom}); });

        socket.on('history', (messages) => {
            document.getElementById('messages').innerHTML = '';
            messages.forEach(data => appendMessage(data));
        });

        socket.on('message', (data) => {
            appendMessage(data);
        });

        // سیستم دریافت نوتیفیکیشن سراسری
        socket.on('notification', (data) => {
            if (data.user === currentUser) return; // پیام خودمان است
            if (data.room === currentRoom) return; // الان داخل همین اتاق هستیم

            let isDM = data.room.startsWith('dm_');
            if (isDM && !data.room.includes(currentUser)) return; // این پیام خصوصی به شخص دیگری است

            // نمایش پاپ‌آپ توست
            let title = isDM ? `Private: ${data.user}` : `${data.room} (${data.user})`;
            let body = data.msgType === 'text' ? data.text : `[Sent a ${data.msgType}]`;
            showToast(title, body, data.room, isDM ? data.user : null);

            // روشن کردن نقطه چشمک‌زن روی سایدبار
            let sideItem = isDM ? document.querySelector(`.chat-item[data-user="${data.user}"]`) : document.querySelector(`.chat-item[data-room="${data.room}"]`);
            if (sideItem) sideItem.classList.add('unread');
        });

        function showToast(title, text, roomToJoin, targetUser) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<div class="toast-title">${title}</div><div class="toast-body">${text}</div>`;
            
            // با کلیک روی نوتیف وارد اتاق شود
            toast.onclick = () => {
                let sideItem = targetUser ? document.querySelector(`.chat-item[data-user="${targetUser}"]`) : document.querySelector(`.chat-item[data-room="${roomToJoin}"]`);
                if(sideItem) sideItem.click();
                toast.remove();
            };
            
            container.appendChild(toast);
            
            // صدای نوتیف (یک صدای کوتاه بیسیک)
            try { document.getElementById('notif-sound').play(); } catch(e){}

            // بستن خودکار بعد از 4 ثانیه
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s forwards';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        function appendMessage(data) {
            const msgBox = document.getElementById('messages');
            const isSelf = data.user === currentUser;
            
            let mediaContent = '';
            if (data.msgType === 'image') mediaContent = `<img src="${data.url}">`;
            else if (data.msgType === 'video') mediaContent = `<video controls src="${data.url}"></video>`;
            else if (data.msgType === 'audio') mediaContent = `<audio controls src="${data.url}"></audio>`;
            else if (data.msgType === 'file') {
                let fName = data.fileName || "Download File";
                mediaContent = `<a href="${data.url}" class="file-link" target="_blank">📄 ${fName}</a>`;
            }

            const html = `
                <div class="message-row ${isSelf ? 'self' : 'other'}">
                    <div class="bubble">
                        <span class="msg-sender">${data.user}</span>
                        ${data.msgType === 'text' ? data.text : mediaContent}
                    </div>
                </div>`;
            
            msgBox.innerHTML += html;
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        function setActive(element) {
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active', 'unread'));
            element.classList.add('active');
        }

        function joinRoom(room, type, element) {
            currentRoom = room;
            document.getElementById('room-name').innerText = room;
            document.getElementById('header-icon').innerText = type === 'channel' ? '📢' : '🌍';
            setActive(element);
            document.getElementById('messages').innerHTML = '';
            socket.emit('join', {room: room});
        }

        function joinPrivateChat(targetUser, element) {
            const users = [currentUser, targetUser].sort();
            currentRoom = `dm_${users[0]}_${users[1]}`;
            document.getElementById('room-name').innerText = targetUser;
            document.getElementById('header-icon').innerText = '👤';
            setActive(element);
            document.getElementById('messages').innerHTML = '';
            socket.emit('join', {room: currentRoom});
        }

        function sendText() {
            const input = document.getElementById('msgInput');
            if(input.value.trim() !== '') {
                socket.emit('send_message', {user: currentUser, room: currentRoom, msgType: 'text', text: input.value});
                input.value = '';
            }
        }

        function handleEnter(e) { if (e.key === 'Enter') sendText(); }

        async function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;
            const formData = new FormData(); 
            formData.append('file', file);
            
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            
            if (data.url) {
                socket.emit('send_message', {
                    user: currentUser, room: currentRoom, 
                    msgType: data.type, url: data.url, fileName: data.name
                });
            }
        }
    </script>
</body>
</html>
