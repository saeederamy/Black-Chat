<!DOCTYPE html>
<html lang="en" dir="ltr" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Black Chat | Workspace</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --bg-dark: #000000; --bg-sidebar: #050505; --bg-chat: #080808;
            --glass-bg: rgba(15, 15, 15, 0.85); --glass-border: rgba(255, 255, 255, 0.08);
            --accent-blue: #0ea5e9; --accent-red: #ef4444; --accent-orange: #f97316;
            --text-main: #ffffff; --text-muted: #8e8e93;
            --bubble-out: rgba(14, 165, 233, 0.15); --bubble-out-border: rgba(14, 165, 233, 0.4);
            --bubble-in: rgba(255, 255, 255, 0.05); --bubble-in-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Vazirmatn', sans-serif; outline: none; -webkit-tap-highlight-color: transparent;}
        body { display: flex; height: 100dvh; background: var(--bg-dark); color: var(--text-main); overflow: hidden; }

        /* Login Screen */
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle at top right, #1a1a1a 0%, #000 80%); display:flex; justify-content:center; align-items:center; flex-direction: column; z-index: 9999; }
        .login-box { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); padding: 40px; border-radius: 20px; text-align: center; width: 90%; max-width: 360px; box-shadow: 0 10px 40px rgba(0,0,0,0.9); }
        .login-box h2 { margin-bottom: 25px; color: var(--accent-orange); font-weight: 700; letter-spacing: 1px;}
        .login-box input { width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border); color: white; border-radius: 12px; transition: 0.3s; font-size: 15px;}
        .login-box input:focus { border-color: var(--accent-blue); box-shadow: inset 0 0 10px rgba(14,165,233,0.2); }
        .login-box button { width: 100%; padding: 14px; background: var(--accent-blue); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(14,165,233,0.3);}
        .login-box button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(14,165,233,0.6); }
        .dev-credit { margin-top: 30px; color: var(--text-muted); font-size: 12px; letter-spacing: 1px; font-family: 'Inter'; text-transform: uppercase;}

        #app { display: none; width: 100%; height: 100%; position: relative; }
        
        /* Sidebar */
        .sidebar { width: 340px; background: var(--bg-sidebar); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; transition: 0.3s; z-index: 100; flex-shrink: 0;}
        .sidebar-header { display: flex; align-items: center; padding: 15px; gap: 15px; height: 65px; border-bottom: 1px solid var(--glass-border); }
        .icon-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 8px; border-radius: 50%; transition: 0.2s;}
        .icon-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .search-bar { flex: 1; background: var(--glass-bg); border-radius: 12px; padding: 10px 15px; border: 1px solid var(--glass-border); display: flex; align-items: center;}
        .search-bar input { background: transparent; border: none; color: white; width: 100%; font-size: 14px;}
        
        .chat-list { flex: 1; overflow-y: auto; padding: 10px 5px;}
        .chat-item { display: flex; align-items: center; padding: 12px 10px; cursor: pointer; transition: 0.2s; gap: 15px; border-radius: 12px; margin-bottom: 2px; position:relative;}
        .chat-item:hover { background: rgba(255,255,255,0.03); }
        .chat-item.active { background: rgba(14, 165, 233, 0.15); border-left: 3px solid var(--accent-blue); }
        [dir="rtl"] .chat-item.active { border-left: none; border-right: 3px solid var(--accent-blue); }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #222, #000); display: flex; justify-content: center; align-items: center; font-size: 20px; flex-shrink:0; border: 1px solid var(--glass-border); overflow: hidden;}
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-info { flex: 1; overflow: hidden; display: flex; flex-direction: column; justify-content: center;}
        .chat-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .chat-preview { font-size: 13px; color: var(--text-muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .unread-badge { background: var(--accent-orange); color: white; font-size: 12px; font-weight: bold; padding: 2px 8px; border-radius: 12px; display: none; box-shadow: 0 0 10px rgba(249,115,22,0.5); }

        .fab { position: absolute; bottom: 25px; right: 25px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent-orange); color: white; border: none; box-shadow: 0 4px 15px rgba(249,115,22,0.4); cursor: pointer; display: flex; justify-content: center; align-items: center; z-index: 50; transition: 0.3s;}
        .fab:hover { transform: scale(1.1) rotate(90deg); }
        [dir="rtl"] .fab { right: auto; left: 25px; }

        /* Main Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; background-color: var(--bg-chat); background-size: cover; background-position: center; position: relative;}
        
        .chat-header { height: 65px; background: var(--glass-bg); backdrop-filter: blur(20px); display: flex; align-items: center; padding: 0 20px; gap: 15px; border-bottom: 1px solid var(--glass-border); z-index: 10;}
        .back-btn { display: none; }
        [dir="rtl"] .back-btn { transform: scaleX(-1); }

        .messages { flex: 1; padding: 20px 5%; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;}
        .msg-row { display: flex; width: 100%; position: relative; animation: popIn 0.3s ease; }
        .msg-row.out { justify-content: flex-end; } 
        .msg-row.in { justify-content: flex-start; }
        
        .bubble { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 14.5px; line-height: 1.5; position: relative; word-break: break-word; border: 1px solid transparent; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; backdrop-filter: blur(5px);}
        .msg-row.out .bubble { background: var(--bubble-out); border-color: var(--bubble-out-border); border-bottom-right-radius: 4px; }
        .msg-row.in .bubble { background: var(--bubble-in); border-color: var(--bubble-in-border); border-bottom-left-radius: 4px; }
        [dir="rtl"] .msg-row.out .bubble { border-bottom-right-radius: 16px; border-bottom-left-radius: 4px; }
        [dir="rtl"] .msg-row.in .bubble { border-bottom-left-radius: 16px; border-bottom-right-radius: 4px; }

        .sender-name { font-size: 12px; color: var(--accent-orange); font-weight: 700; margin-bottom: 5px; display: block; }
        .msg-row.out .sender-name { display: none; }
        
        .delete-msg-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--accent-red); border-radius: 50%; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; cursor: pointer; opacity: 0; transition: 0.2s; }
        .msg-row.out .delete-msg-btn { right: calc(100% + 10px); }
        [dir="rtl"] .msg-row.out .delete-msg-btn { right: auto; left: calc(100% + 10px); }
        .msg-row:hover .delete-msg-btn { opacity: 1; }
        .delete-msg-btn:hover { background: var(--accent-red); color: white; }

        /* Media Attachments */
        .bubble img, .bubble video { max-width: 100%; border-radius: 12px; margin-top: 5px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .blur-media { filter: blur(15px); transition: filter 0.3s; }
        .dl-overlay { position: absolute; top:50%; left:50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.6); color: white; border-radius: 50%; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; cursor: pointer; backdrop-filter: blur(5px);}
        .bubble audio { width: 260px; height: 44px; margin-top: 5px; outline: none;}
        
        .file-link { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; color: white; text-decoration: none; margin-top:5px; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s;}
        .file-link:hover { background: rgba(14,165,233,0.1); border-color: var(--accent-blue); }
        .file-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--accent-orange); display: flex; justify-content: center; align-items: center; color: white; }

        /* Input Area with Action Icons */
        .input-area { background: var(--glass-bg); backdrop-filter: blur(20px); padding: 10px 15px; padding-bottom: max(10px, env(safe-area-inset-bottom)); display: flex; align-items: flex-end; gap: 8px; border-top: 1px solid var(--glass-border); z-index: 10;}
        .msg-input-wrapper { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); border-radius: 24px; display: flex; align-items: center; padding: 0 10px; min-height: 48px; transition: 0.3s;}
        .msg-input-wrapper:focus-within { border-color: var(--accent-blue); box-shadow: inset 0 0 10px rgba(14,165,233,0.1); }
        .msg-input-wrapper input { width: 100%; background: transparent; border: none; color: white; font-size: 15px; padding: 10px; }
        
        .action-btn { background: transparent; color: var(--text-muted); width: 40px; height: 40px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; flex-shrink: 0;}
        .action-btn:hover { color: var(--accent-blue); background: rgba(255,255,255,0.05); }
        .action-btn.send { color: white; background: var(--accent-blue); box-shadow: 0 4px 15px rgba(14,165,233,0.4);}
        .action-btn.recording { background: var(--accent-red); color: white; animation: pulseRecord 1.5s infinite; box-shadow: 0 0 15px rgba(239,68,68,0.6);}
        
        .rec-timer { display: none; color: var(--accent-red); font-weight: bold; font-family: monospace; font-size: 15px; padding: 0 10px; animation: blink 1s infinite;}

        @keyframes popIn { from { opacity: 0; transform: translateY(10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes pulseRecord { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* Modals & Menus */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .modal-box { background: var(--bg-sidebar); border: 1px solid var(--glass-border); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 15px 50px rgba(0,0,0,0.8); display: flex; flex-direction: column; gap: 15px;}
        .modal-box h3 { margin-bottom: 10px; color: var(--accent-orange); font-weight: 600;}
        .modal-box input, .modal-box select { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: white; border-radius: 12px; font-size: 14px;}
        .modal-actions { display: flex; gap: 10px; margin-top: 10px; }
        .modal-actions button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s;}
        .modal-actions .btn-cancel { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border);}
        .modal-actions .btn-confirm { background: var(--accent-blue); color: white; }
        
        .toggle-switch { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--glass-border);}
        .ip-list { max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 10px; font-size: 12px; font-family: monospace; color: var(--accent-orange);}

        /* Side Drawer */
        .drawer { position: fixed; top:0; left: -320px; width: 300px; height: 100%; background: var(--bg-sidebar); z-index: 2001; transition: 0.3s; display: flex; flex-direction: column; box-shadow: 5px 0 25px rgba(0,0,0,0.5);}
        [dir="rtl"] .drawer { left: auto; right: -320px; box-shadow: -5px 0 25px rgba(0,0,0,0.5); }
        .drawer.open { left: 0; }
        [dir="rtl"] .drawer.open { right: 0; left: auto;}
        
        .drawer-header { padding: 30px 20px 20px 20px; background: var(--glass-bg); border-bottom: 1px solid var(--glass-border); }
        .drawer-avatar { width: 70px; height: 70px; border-radius: 50%; background: var(--accent-blue); display: flex; justify-content: center; align-items: center; font-size: 28px; margin-bottom: 15px; position: relative; overflow: hidden;}
        .drawer-avatar img { width: 100%; height: 100%; object-fit: cover;}
        .cam-btn { position: absolute; bottom: 0; right: 0; background: rgba(0,0,0,0.6); width: 100%; height: 25px; display: flex; justify-content: center; align-items: center; cursor: pointer; color: white; font-size: 12px;}
        .drawer-item { padding: 15px 25px; display: flex; align-items: center; gap: 20px; color: var(--text-main); cursor: pointer; transition: 0.2s; font-size: 15px; font-weight: 500;}
        .drawer-item:hover { background: rgba(255,255,255,0.03); color: var(--accent-orange);}
        .drawer-item svg { width: 24px; height: 24px; fill: currentColor; }

        @media (max-width: 768px) {
            .sidebar { position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 50; }
            [dir="rtl"] .sidebar { right:0; left:auto;}
            .sidebar.hidden { transform: translateX(-100%); }
            [dir="rtl"] .sidebar.hidden { transform: translateX(100%); }
            .back-btn { display: flex; }
        }
    </style>
</head>
<body>

    <svg style="display:none;">
        <symbol id="icon-menu" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></symbol>
        <symbol id="icon-search" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></symbol>
        <symbol id="icon-back" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></symbol>
        <symbol id="icon-attach" viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></symbol>

        <symbol id="icon-send" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></symbol>

        <symbol id="icon-group" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></symbol>
        <symbol id="icon-add" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></symbol>
        <symbol id="icon-trash" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></symbol>
    </svg>

    <div id="login-screen">
        <div class="login-box">
            <h2 data-i18n="login_title">System Login</h2>
            <input type="text" id="username" placeholder="Username" autocomplete="off" autocapitalize="none">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()" data-i18n="btn_login">Authenticate</button>
        </div>
        <div class="dev-credit">Developed by saeed eramy</div>
    </div>

    <div id="app">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="icon-btn" onclick="toggleDrawer()"><svg class="svg-icon"><use href="#icon-menu"></use></svg></button>
                <div class="search-bar">
                    <svg class="svg-icon" style="width:18px; fill:var(--text-muted)"><use href="#icon-search"></use></svg>
                    <input type="text" id="searchInput" data-i18n-ph="search_ph" placeholder="Search..." onkeyup="searchChat()">
                </div>
            </div>
            <div class="chat-list" id="chat-list"></div>
            
            <button class="fab" onclick="openModal('contactModal')">
                <svg class="svg-icon"><use href="#icon-add"></use></svg>
            </button>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="chat-header">
                <button class="icon-btn back-btn" onclick="closeChat()"><svg class="svg-icon"><use href="#icon-back"></use></svg></button>
                <div class="avatar" id="header-avatar" style="width:42px;height:42px;">📢</div>
                <div style="display:flex; flex-direction:column; justify-content:center;">
                    <h3 id="room-title" style="font-size:16px; font-weight:600;"></h3>
                    <span id="room-status" style="font-size:12px; color:var(--accent-blue);"></span>
                </div>
            </div>
            
            <div class="messages" id="messages"></div>
            
            <div class="input-area" id="input-area">
                <input type="file" id="fileInput" style="display:none" onchange="uploadFile()">
                <button class="action-btn" onclick="document.getElementById('fileInput').click()">
                    <svg class="svg-icon"><use href="#icon-attach"></use></svg>
                </button>
                
                <div class="msg-input-wrapper">
                    <span class="rec-timer" id="recTimer">00:00</span>
                    <input type="text" id="msgInput" data-i18n-ph="type_ph" placeholder="Write a message..." autocomplete="off" oninput="checkInput()">
                </div>
                
                <button class="action-btn" id="actionVideoBtn" onclick="toggleVideoRecord()" title="Video Message">
                    <svg class="svg-icon"><use href="#icon-cam"></use></svg>
                </button>
                
                <button class="action-btn" id="actionBtn" onclick="handleAction()" title="Voice / Send">
                    <svg class="svg-icon"><use href="#icon-mic"></use></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="menuOverlay" onclick="closeAll()"></div>
    
    <div class="drawer" id="sideDrawer">
        <div class="drawer-header">
            <div class="drawer-avatar">
                <img id="my-avatar" src="" style="display:none;">
                <span id="my-initial">U</span>
                <div class="cam-btn" onclick="document.getElementById('avatarInput').click()">📷</div>
                <input type="file" id="avatarInput" style="display:none" accept="image/*" onchange="uploadAvatar()">
            </div>
            <h3 id="profile-name" style="color:white; font-size:18px;"></h3>
            <p id="profile-role" style="color:var(--text-muted); font-size:13px;"></p>
        </div>
        <div style="padding: 10px 0; flex:1; overflow-y:auto;">
            <div class="drawer-item" onclick="openModal('groupModal')">
                <svg><use href="#icon-group"></use></svg> <span data-i18n="new_group">New Group</span>
            </div>
            <div class="drawer-item" onclick="openModal('settingsModal')">
                <svg><use href="#icon-settings"></use></svg> <span data-i18n="settings">Settings</span>
            </div>
        </div>
        <div style="padding: 20px; text-align:center; border-top:1px solid var(--glass-border);">
            <button style="background:none; border:none; color:var(--accent-red); font-weight:bold; cursor:pointer;" onclick="location.reload()" data-i18n="logout">Log Out</button>
        </div>
    </div>

    <div class="modal-overlay" id="contactModal">
        <div class="modal-box">
            <h3 data-i18n="add_contact">Add Contact</h3>
            <input type="text" id="contactUsername" data-i18n-ph="username_ph" placeholder="Enter Username">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('contactModal')" data-i18n="cancel">Cancel</button>
                <button class="btn-confirm" onclick="submitContact()" data-i18n="add">Add</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="groupModal">
        <div class="modal-box">
            <h3>Group / Channel</h3>
            <select id="creationType">
                <option value="group" data-i18n="group">Public Group</option>
                <option value="channel" data-i18n="channel">Public Channel</option>
            </select>
            <input type="text" id="creationName" placeholder="Name">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('groupModal')" data-i18n="cancel">Cancel</button>
                <button class="btn-confirm" onclick="submitCreation()" data-i18n="create">Create</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-box" style="max-width: 450px;">
            <h3 data-i18n="settings">Settings</h3>
            
            <div class="toggle-switch">
                <span data-i18n="language">Language</span>
                <select id="langSelect" onchange="changeLang(this.value)" style="width:120px; padding:6px; margin:0;">
                    <option value="en">English</option>
                    <option value="fa">فارسی</option>
                </select>
            </div>
            
            <div class="toggle-switch">
                <span data-i18n="auto_dl">Auto-Download Media</span>
                <input type="checkbox" id="autoDlToggle" style="width:auto; transform:scale(1.5);" checked onchange="toggleAutoDl(this.checked)">
            </div>
            
            <div class="toggle-switch" style="flex-direction:column; align-items:flex-start; gap:10px;">
                <span data-i18n="chat_bg">Chat Background (URL)</span>
                <input type="text" id="bgInput" placeholder="https://..." onchange="changeBg(this.value)">
            </div>
            
            <div style="margin-top:15px;">
                <span style="font-size:13px; color:var(--text-muted);" data-i18n="active_sessions">Active Sessions (IPs)</span>
                <div class="ip-list" id="ipList"></div>
            </div>
            
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal('settingsModal')" data-i18n="close">Close</button>
            </div>
        </div>
    </div>

    <audio id="notif-sound" src="data:audio/mp3;base64,//NExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq" preload="auto"></audio>

    <script src="/static/script.js"></script>
</body>
</html>
